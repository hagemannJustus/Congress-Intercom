services:
  # 1. Backend Service (FastAPI)
  - type: web
    name: congress-intercom-backend
    env: python
    rootDirectory: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        # Default to internal SQLite, but can be overridden by a linked DB
        value: sqlite+aiosqlite:///./magic_links.db
      - key: BACKEND_URL
        fromService:
          type: web
          name: congress-intercom-backend
          property: host
        generateValue: "https://${value}"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: congress-intercom-frontend
          property: host
        generateValue: "https://${value}"

  # 2. Frontend Service (Vite Static Site)
  - type: web
    name: congress-intercom-frontend
    env: static
    rootDirectory: webapp
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_GRAPHQL_URL
        fromService:
          type: web
          name: congress-intercom-backend
          property: host
        generateValue: "https://${value}/graphql"

# Optional: Add a PostgreSQL database if you want persistence
# Render's free tier DBs expire after 90 days.
# databases:
#   - name: congress-intercom-db
#     plan: free
