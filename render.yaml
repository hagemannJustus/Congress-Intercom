services:
  # 1. Backend Service (FastAPI)
  - type: web
    name: congress-intercom-backend
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: congress-intercom-db
          property: connectionString
      - key: BACKEND_URL
        fromService:
          type: web
          name: congress-intercom-backend
          property: host
      - key: FRONTEND_URL
        fromService:
          type: web
          name: congress-intercom-frontend
          property: host

  # 2. Frontend Service (Vite Static Site)
  - type: static
    name: congress-intercom-frontend
    rootDir: webapp
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_GRAPHQL_URL
        fromService:
          type: web
          name: congress-intercom-backend
          property: host

databases:
  - name: congress-intercom-db
    plan: free
