services:
  # 1. Backend Service (FastAPI)
  - type: web
    name: congress-intercom-backend
    plan: free
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: congress-intercom-db
          property: connectionString
      - key: BACKEND_URL
        value: https://congress-intercom-backend-c84u.onrender.com
      - key: FRONTEND_URL
        # This will be something like https://congress-intercom-frontend-xxx.onrender.com
        # Render will automatically assign one, but for verification links, 
        # it's best to set this after the first deployment or use the dashboard.
        value: https://congress-intercom-frontend-c84u.onrender.com

  # 2. Frontend Service (Vite Static Site)
  - type: web
    name: congress-intercom-frontend
    env: static
    rootDir: webapp
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_GRAPHQL_URL
        value: https://congress-intercom-backend-c84u.onrender.com/graphql

databases:
  - name: congress-intercom-db
    plan: free
